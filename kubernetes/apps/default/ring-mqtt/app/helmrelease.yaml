---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: ring-mqtt
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 2.5.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: storage
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: tsightler/ring-mqtt
              tag: v5.6.3
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 1Gi
    persistence:
      data:
        enabled: true
        existingClaim: ring-mqtt
        globalMounts:
          - path: /data
      config-file:
        type: configMap
        name: ring-mqtt-configmap
        globalMounts:
          - path: /data/config.json
            subPath: config.json
            readOnly: true
