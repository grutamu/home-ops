---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ring-mqtt
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 2.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: storage
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: tsightler/ring-mqtt
              tag: 5.6.4
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 1Gi
            probes:
                liveness:
                  enabled: false
                readiness:
                  enabled: false
                startup:
                  enabled: false
    service:
      main:
        enabled: false
        # ports:
        #   http:
        #     port: 55123
    # ingress:
    #   main:
    #     enabled: true
    #     className: internal
    #     hosts:
    #       - host: &host ring-mqtt.calzone.zone
    #         paths:
    #           - path: /
    #             service:
    #               name: main
    #               port: http
    #     tls:
    #       - hosts:
    #           - *host
    persistence:
      data:
        enabled: true
        existingClaim: ring-mqtt
        globalMounts:
          - path: /data
      config-file:
        type: secret
        name: ring-mqtt-configmap
        globalMounts:
          - path: /data/config.json
            subPath: config.json
            readOnly: true
