---
# yaml-language-server: $schema=https://frigate.devbu.io/api/config/schema.json
logger:
  default: info
  # logs:
  #   frigate.record: debug

mqtt:
  host: mosquitto.default.svc.cluster.local
  topic_prefix: frigate
  user: "{FRIGATE_MQTT_USERNAME}"
  password: "{FRIGATE_MQTT_PASSWORD}"

database:
  path: /data/frigate.db

# detectors:
#   coral:
#     type: edgetpu
#     device: usb

ffmpeg:
  global_args: ["-hide_banner", "-loglevel", "warning"]
  hwaccel_args: ["-hwaccel", "vaapi", "-hwaccel_device", "/dev/dri/renderD128", "-hwaccel_output_format", "yuv420p"]
  output_args:
    record: preset-record-ubiquiti

snapshots:
  enabled: true
  timestamp: false
  bounding_box: true
  retain:
    default: 1

record:
  enabled: true
  retain:
    days: 1
    mode: all
  events:
    retain:
      default: 1
      mode: active_objects

objects:
  track: ["person"]
  filters:
    person:
      min_area: 5000
      max_area: 100000
      threshold: 0.7

go2rtc:
  streams:
    frigate_frontdoor_hq: rtsps://192.168.1.1:7441/uOdLAlKjUTaCcKey
    frigate_frontdoor_lq: rtsps://192.168.1.1:7441/8KanNbc6boyTJpmV
    frigate_packagecam: rtsps://192.168.1.1:7441/oZ6zmPyXEdVwUOZs
    frigate_garage_hq: rtsps://192.168.1.1:7441/xnexsGcsDCI8PxZY
    frigate_garage_lq: rtsps://192.168.1.1:7441/aDWsDvkL16CmQpiB

cameras:
  frigate_frontdoor:
    ffmpeg:
      inputs:
        - path: rtsp://localhost:8554/frigate_frontdoor_lq
          roles: ["detect"]
        - path: rtsp://localhost:8554/frigate_frontdoor_hq
          roles: ["record"]
    detect:
      width: 960
      height: 720
      fps: 10


